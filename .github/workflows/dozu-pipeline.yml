name: dozu-pipeline

on:
  push:
    branches: [develop, feature/merge]
  pull_request:
    branches: [develop, feature/merge]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint

      - name: Build application
        run: npm run build
        env:
          NODE_ENV: production
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            .next
            package*.json
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files

      - name: Deploy to remote host
        uses: appleboy/scp-action@master
        with:
          host: 192.168.1.168
          username: github
          password: 123456
          source: '.next,package*.json'
          target: /projects/dozu-ui-service
          timeout: 120s
          overwrite: true

      - name: Execute deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 192.168.1.168
          username: github
          password: 123456
          script: |
            cd ${{ secrets.PATH_PROJECT }}
            pm2 stop next-app || true
            npm install --production
            pm2 start npm --name "next-app" -- start -- -p 3000
  logs:
    name: Logs
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check deployment status
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 192.168.1.168
          username: github
          password: 123456
          script: |
            cd ${{ secrets.PATH_PROJECT }}
            pm2 status
            pm2 logs next-app --lines 50
            echo "Deployment completed successfully"
