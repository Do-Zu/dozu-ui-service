name: Next.js CI/CD Pipeline

on:
  push:
    branches: [develop, feature/merge]
  pull_request:
    branches: [develop, feature/merge]

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: |
          npm ci
          npm run lint
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            .next
            package*.json

  health-check:
    needs: build
    runs-on: ubuntu-20.04
    steps:
      - uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            netstat -tulpn | grep :3000 || true
            df -h /
            free -m

  deploy:
    needs: health-check
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-files
      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          timeout: 60s
          script: |
            # Configuration
            DEPLOY_DIR="/projects/productions/dozu-ui-service"
            BACKUP_DIR="${DEPLOY_DIR}_backup_$(date +%Y%m%d_%H%M%S)"

            # Deployment logging
            exec 1> >(tee -a "${DEPLOY_DIR}/deploy.log")
            exec 2>&1
            echo "Starting deployment at $(date)"

            # Directory handling
            if [ -d "$DEPLOY_DIR" ]; then
              echo "Backing up existing deployment"
              cp -r "$DEPLOY_DIR" "$BACKUP_DIR"
            else
              echo "Creating new deployment directory"
              mkdir -p "$DEPLOY_DIR"
            fi

            # Navigate to directory
            cd "$DEPLOY_DIR" || {
              echo "Failed to change to deployment directory"
              exit 1
            }

            # Stop existing service
            echo "Stopping existing service"
            pm2 stop next-app || true

            # Deploy new version
            echo "Deploying new version"
            rsync -avz --delete "$GITHUB_WORKSPACE/.next" .
            rsync -avz "$GITHUB_WORKSPACE/package*.json" .

            # Install dependencies
            echo "Installing dependencies"
            npm ci --production --no-audit --no-fund

            # Start service
            echo "Starting service"
            pm2 start npm --name "next-app" -- start -- -p 3000
            pm2 save

            echo "Deployment completed at $(date)"
  verify:
    needs: deploy
    runs-on: ubuntu-20.04
    steps:
      - uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            cd /projects/dozu-ui-service
            curl -f http://localhost:3000 || exit 1
            pm2 status
            pm2 logs next-app --lines 20
