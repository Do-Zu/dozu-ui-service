name: Next.js CI/CD Pipeline

on:
  push:
    branches: [develop, feature/merge]
  pull_request:
    branches: [develop, feature/merge]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Clear npm Cache
        run: npm cache clean --force

      - name: Install Dependencies
        run: npm ci --no-audit --progress=false

      - name: Build Project
        run: npm run build
        env:
          NODE_ENV: production

  backup:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Backup Deployment
        run: |
          DEPLOY_DIR="/projects/productions/dozu-ui-service"
          BACKUP_DIR="${DEPLOY_DIR}_backup_$(date +%Y%m%d_%H%M%S)"

          echo "Starting deployment..."

          # Backup
          if [ -d "$DEPLOY_DIR" ]; then
            echo "Backing up current deployment..."
            rsync -a --delete "$DEPLOY_DIR/" "$BACKUP_DIR/"
          fi

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Deploy Application
        run: |
          DEPLOY_DIR="/projects/productions/dozu-ui-service"
          BACKUP_DIR="${DEPLOY_DIR}_backup_$(date +%Y%m%d_%H%M%S)"

          echo "Starting deployment..."

          mkdir -p "$DEPLOY_DIR"
          rsync -a --delete .next "$DEPLOY_DIR/"
          cp package*.json "$DEPLOY_DIR/"

          echo "Installing dependencies..."
          cd "$DEPLOY_DIR"
          npm ci --omit=dev

          echo "Restarting application"
          cd "$DEPLOY_DIR"
          pm2 stop next-app || true
          pm2 start npm --name "next-app" -- start -- -p 3000
          pm2 save

  logs:
    needs: deploy
    runs-on: self-hosted
    steps:
      - name: Verify Deployment Status
        run: |
          cd /projects/productions/dozu-ui-service

          # Check if PM2 process is running
          if ! pm2 describe next-app | grep -q "online"; then
            echo "❌ Application failed to start"
            pm2 logs next-app --lines 20
            exit 1
          fi

          # Check if application responds
          if ! curl -f http://localhost:3000 > /dev/null 2>&1; then
            echo "❌ Application is not responding"
            pm2 logs next-app --lines 20
            exit 1
          fi

          echo "✅ Deployment successful"
          echo "Pipeline completed successfully"
