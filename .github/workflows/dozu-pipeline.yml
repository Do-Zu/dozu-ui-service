name: Next.js CI/CD

on:
  push:
    branches: [develop, feature/merge]
  pull_request:
    branches: [develop, feature/merge]

jobs:
  deploy:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.HOST_IP }} "
            cd /projects/productions/dozu-ui-service
            pm2 stop next-app || true
            rm -rf .next
            mkdir -p .next
          "
          
          scp -r .next/* ${{ secrets.DEPLOY_USER }}@${{ secrets.HOST_IP }}:/projects/productions/dozu-ui-service/.next/
          scp package*.json ${{ secrets.DEPLOY_USER }}@${{ secrets.HOST_IP }}:/projects/productions/dozu-ui-service/
          
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.HOST_IP }} "
            cd /projects/productions/dozu-ui-service
            npm install --production
            pm2 start npm --name 'next-app' -- start -- -p 3000
            pm2 save
          "
