name: Next.js CI/CD Pipeline

on:
  push:
    branches: [develop, feature/merge]
  pull_request:
    branches: [develop, feature/merge]

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: |
          npm ci
          npm run lint
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: |
            .next
            package*.json

  health-check:
    needs: build
    runs-on: ubuntu-20.04
    steps:
      - uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            netstat -tulpn | grep :3000 || true
            df -h /
            free -m

  deploy:
    needs: health-check
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-files
      - uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            mkdir -p /projects/dozu-ui-service
            cd /projects/dozu-ui-service
            pm2 stop next-app || true
            rsync -avz --delete $GITHUB_WORKSPACE/.next .
            rsync -avz $GITHUB_WORKSPACE/package*.json .
            npm install --production
            pm2 start npm --name "next-app" -- start -- -p 3000
            pm2 save

  verify:
    needs: deploy
    runs-on: ubuntu-20.04
    steps:
      - uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            cd /projects/dozu-ui-service
            curl -f http://localhost:3000 || exit 1
            pm2 status
            pm2 logs next-app --lines 20
