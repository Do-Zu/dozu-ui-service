name: Next.js CI/CD Pipeline

on:
  push:
    branches: [develop, feature/merge]
  pull_request:
    branches: [develop, feature/merge]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: |
          npm ci
          npm run build

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Deploy Application
        run: |
          DEPLOY_DIR="/projects/productions/dozu-ui-service"
          BACKUP_DIR="${DEPLOY_DIR}_backup_$(date +%Y%m%d_%H%M%S)"
          
          # Backup
          if [ -d "$DEPLOY_DIR" ]; then
            cp -r "$DEPLOY_DIR" "$BACKUP_DIR"
          fi
          
          # Deploy
          mkdir -p "$DEPLOY_DIR"
          cp -r .next "$DEPLOY_DIR/"
          cp package*.json "$DEPLOY_DIR/"
          
          # Install & Start
          cd "$DEPLOY_DIR"
          npm ci --production
          pm2 stop next-app || true
          pm2 start npm --name "next-app" -- start -- -p 3000
          pm2 save

  logs:
    needs: deploy
    runs-on: self-hosted
    steps:
      - name: Check Deployment
        run: |
          cd /projects/productions/dozu-ui-service
          pm2 status
          pm2 logs next-app --lines 20
