name: CI/CD pipeline Dev environment

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

env:
  DEPLOY_DIR: /projects/productions/dozu-ui-service
  APP_PORT: 3000
  NODE_VERSION: '18'
  PM2_APP_NAME: next-app

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm cache clean --force
      - run: npm ci --no-audit --progress=false
      - run: npm run build
        env:
          NODE_ENV: production

  backup:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Backup Deployment
        run: |
          BACKUP_DIR="${{ env.DEPLOY_DIR }}_backup_$(date +%Y%m%d_%H%M%S)"
          if [ -d "${{ env.DEPLOY_DIR }}" ]; then
            echo "Backing up current deployment..."
            rsync -a --delete "${{ env.DEPLOY_DIR }}/" "$BACKUP_DIR/"
          fi

  deploy:
    needs: backup
    runs-on: self-hosted
    steps:
      - name: Deploy Application
        run: |
          mkdir -p "${{ env.DEPLOY_DIR }}"
          rsync -a --delete .next "${{ env.DEPLOY_DIR }}/"
          cp package*.json "${{ env.DEPLOY_DIR }}/"
          cd "${{ env.DEPLOY_DIR }}"
          npm ci --omit=dev
          pm2 stop ${{ env.PM2_APP_NAME }} || true
          pm2 start npm --name "${{ env.PM2_APP_NAME }}" -- start -- -p ${{ env.APP_PORT }}
          pm2 save

  verify:
    needs: deploy
    runs-on: self-hosted
    steps:
      - name: Verify Deployment
        run: |
          cd ${{ env.DEPLOY_DIR }}
          if ! pm2 describe ${{ env.PM2_APP_NAME }} | grep -q "online"; then
            echo "❌ Application failed to start"
            pm2 logs ${{ env.PM2_APP_NAME }} --lines 20
            exit 1
          fi
          if ! curl -f http://localhost:${{ env.APP_PORT }} > /dev/null 2>&1; then
            echo "❌ Application is not responding"
            pm2 logs ${{ env.PM2_APP_NAME }} --lines 20
            exit 1
          fi
          echo "✅ Deployment successful"
