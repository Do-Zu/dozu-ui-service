name: dozu-pipeline

on:
  push:
    branches: [ develop , feature/merge ]
  pull_request:
    branches: [ develop, feature/merge ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linting
      run: npm run lint

    - name: Build application
      run: npm run build
      env:
        NODE_ENV: production

    - name: Deploy to remote host
      uses: appleboy/scp-action@v0.1.7
      with:
        host: '192.168.235.100'
        username: ${{ secrets.DEPLOY_USER }}
        password: ${{ secrets.DEPLOY_PASSWORD }}
        port: 22
        source: ".next,package.json,package-lock.json,node_modules"
        target: "/projects/dozu-ui-service"

    - name: Execute remote commands
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: '192.168.235.100'
        username: ${{ secrets.DEPLOY_USER }}
        password: ${{ secrets.DEPLOY_PASSWORD }}
        port: 22
        script: |
          cd /projects/dozu-ui-service
          pm2 stop next-app || true
          npm install --production
          pm2 start npm --name "next-app" -- start -- -p 3000
