name: CI/CD pipeline production environment

on:
  # pull_request:
  #   paths:
  #     - 'src/**'
  #     - 'package.json'
  #   branches: [main]
  workflow_dispatch:
    inputs:
      branch_to_deploy:
        description: 'Branch to deploy'
        required: true
        default: 'feature/merge'
        type: choice
        options:
          - develop
          - feature/merge
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'Development'
        type: choice
        options:
          - Development
          - Production
      deploy_to_vercel:
        description: 'Deploy to Vercel'
        required: true
        default: true
        type: boolean

env:
  DEPLOY_DIR: /projects/productions/dozu-ui-service
  NODE_VERSION: '20'
  PM2_APP_NAME: next-app
  NODE_ENV: production
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch_to_deploy }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install --no-audit --progress=false
      - name: Lint code
        run: npm run lint
        env:
          NODE_ENV: ${{ env.NODE_ENV }}

  vercel-deploy:
    needs: validate
    if: ${{ github.event.inputs.deploy_to_vercel == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch_to_deploy }}

      - name: Setup Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=${{ github.event.inputs.environment == 'Production' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod=${{ github.event.inputs.environment == 'Production' }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod=${{ github.event.inputs.environment == 'Production' }} --token=${{ secrets.VERCEL_TOKEN }}
