name: CI/CD pipeline dev and test features environment

on:
  push:
    tags:
      - 'v*.*.*'
      - 'release-*.*.*'
      - 'hotfix-*.*.*'
      - 'feature-*.*.*'
      - 'bugfix-*.*.*'
      - 'dev-*.*.*'
    paths:
      - 'src/**'
      - 'package.json'
    branches: [feature/merge]
  pull_request:
    types: [closed]
    branches: [feature/merge]
    paths:
      - 'src/**'
      - 'package.json'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select the environment to deploy'
        required: true
        default: 'Staging'
        type: choice
        options:
          - Staging

env:
  DEPLOY_DIR: /projects/staging/dozu-ui
  APP_PORT: 3111
  NODE_VERSION: '18'
  PM2_APP_NAME: dozu-ui-app-staging
  NODE_ENV: stage
  EC2_USER: ubuntu
  EC2_HOST: '${{ secrets.EC2_HOST }}'
  SSH_KEY: '${{ secrets.EC2_SSH_KEY }}'
  SSH_OPTIONS: '-o StrictHostKeyChecking=no'

jobs:
  build:
    # if: github.event.pull_request.merged == true
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci --no-audit --progress=false
      - run: npm run build
        env:
          NODE_ENV: ${{ env.NODE_ENV }}
      - name: Archive build artifacts
        run: tar -czf build.tar.gz .next package*.json
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
      - name: Add Key
        run: |
          echo "$SSH_KEY" > private_key.pem
          chmod 600 private_key.pem
      - name: Transfer build to EC2
        run: |
          scp $SSH_OPTIONS -i private_key.pem build.tar.gz $EC2_USER@$EC2_HOST:/tmp/build.tar.gz
      - name: Deploy Application on EC2
        run: |
          ssh $SSH_OPTIONS -i private_key.pem $EC2_USER@$EC2_HOST << 'EOF'
          set -e

          # Set Node memory limit
          export NODE_OPTIONS="--max-old-space-size=512"

          # Create new directory
          mkdir -p "${{ env.DEPLOY_DIR }}"

          # Extract build files with memory optimization
          cd "${{ env.DEPLOY_DIR }}"
          tar xzf /tmp/build.tar.gz

          # Clear npm cache and install with memory optimization
          npm cache clean --force
          npm ci --omit=dev --progress=false --production --no-audit --no-fund

          # Stop old process
          pm2 delete ${{ env.PM2_APP_NAME }} || true

          # Start with memory limits
          pm2 start npm --name "${{ env.PM2_APP_NAME }}" \
            --node-args="--max-old-space-size=512" \
            --max-memory-restart 450M \
            -- start -- -p ${{ env.APP_PORT }}

          # Save PM2 config
          pm2 save --force

          # Cleanup
          rm /tmp/build.tar.gz

          # Clear system cache
          sudo sh -c "sync; echo 3 > /proc/sys/vm/drop_caches"
          EOF
